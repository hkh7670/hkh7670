name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 자정(UTC) 실행
  workflow_dispatch:        # 수동 실행 버튼도 추가

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          #options: username=hkh7670&show_icons=true&theme=transparent
          options: username=hkh7670&show_icons=true&theme=transparent&hide=prs,issues
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=hkh7670&layout=compact&theme=transparent
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update stats cards" || exit 0
          git push
